server:
  port: 8084
spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:h2:file:./data/cart-db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
