server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # Product Service
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/brands/**,/api/inventory/**
          filters:
            - StripPrefix=1

        # Cart Service
        - id: cart-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1

        # Order Service
        - id: order-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        # Payment Service
        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

        # Delivery Service
        - id: delivery-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/deliveries/**
          filters:
            - StripPrefix=1

        # Notification Service
        - id: notification-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/notifications/**,/ws/**
          filters:
            - StripPrefix=1

        # User Service
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**,/api/addresses/**
          filters:
            - StripPrefix=1

        # Analytics Service
        - id: analytics-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
