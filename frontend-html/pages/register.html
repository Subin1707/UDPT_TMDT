<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - E-Commerce</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="brand">E-Commerce</a>
      <nav></nav>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Tạo tài khoản mới</h1>
        <p class="auth-description">Tham gia hệ thống và bắt đầu mua sắm</p>

        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label for="fullName">Họ và tên</label>
            <input type="text" id="fullName" name="fullName" required placeholder="Nhập họ và tên">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label for="phone">Số điện thoại (tùy chọn)</label>
            <input type="tel" id="phone" name="phone" placeholder="0123456789">
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
          </div>

          <div class="form-group">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Nhập lại mật khẩu">
          </div>

          <div id="error-message" class="error-message" style="display: none;"></div>

          <button type="submit" class="btn btn-full">Tạo tài khoản</button>
        </form>

        <div class="auth-footer">
          <p>Đã có tài khoản? <a href="/pages/login.html">Đăng nhập</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const fullName = document.getElementById('fullName').value
      const email = document.getElementById('email').value
      const phone = document.getElementById('phone').value
      const password = document.getElementById('password').value
      const confirmPassword = document.getElementById('confirmPassword').value
      const errorDiv = document.getElementById('error-message')

      if (password !== confirmPassword) {
        errorDiv.textContent = 'Mật khẩu không khớp'
        errorDiv.style.display = 'block'
        return
      }

      try {
        await auth.register(fullName, email, phone, password)
        showToast('Đăng ký thành công!', 'success')
        setTimeout(() => {
          window.location.href = '/'
        }, 500)
      } catch (error) {
        errorDiv.textContent = error.message || 'Đăng ký thất bại'
        errorDiv.style.display = 'block'
      }
    })
  </script>
</body>
</html>
