<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - E-Commerce</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="brand">E-Commerce</a>
      <nav></nav>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Chào mừng trở lại</h1>
        <p class="auth-description">Đăng nhập để tiếp tục quản lý đơn hàng</p>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
          </div>

          <div id="error-message" class="error-message" style="display: none;"></div>

          <button type="submit" class="btn btn-full">Đăng nhập</button>
        </form>

        <div class="auth-footer">
          <p>Chưa có tài khoản? <a href="/pages/register.html">Đăng ký ngay</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const errorDiv = document.getElementById('error-message')

      try {
        await auth.login(email, password)
        showToast('Đăng nhập thành công!', 'success')
        setTimeout(() => {
          const redirect = getUrlParam('redirect')
          window.location.href = redirect || '/'
        }, 500)
      } catch (error) {
        errorDiv.textContent = error.message || 'Đăng nhập thất bại'
        errorDiv.style.display = 'block'
      }
    })
  </script>
</body>
</html>
