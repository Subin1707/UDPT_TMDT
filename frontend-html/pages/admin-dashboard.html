<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - E-Commerce</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="brand">E-Commerce Admin</a>
      <nav>
        <a href="/" class="nav-link">Trang chủ</a>
        <div class="auth-nav"></div>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>Bảng Điều Khiển Quản Lý</h1>
      
      <div class="dashboard-grid">
        <div class="dashboard-card">
          <h3>Tổng đơn hàng</h3>
          <p class="card-number" id="total-orders">0</p>
          <span class="card-label">Hoàn thành: <span id="completed-orders">0</span></span>
        </div>
        <div class="dashboard-card">
          <h3>Doanh thu</h3>
          <p class="card-number" id="total-revenue">$0.00</p>
          <span class="card-label">Ước tính realtime</span>
        </div>
        <div class="dashboard-card">
          <h3>Sản phẩm</h3>
          <p class="card-number" id="total-products">0</p>
          <span class="card-label">Trong catalog</span>
        </div>
        <div class="dashboard-card">
          <h3>Cảnh báo</h3>
          <p class="card-number" id="failed-orders">0</p>
          <span class="card-label">Đơn hàng thất bại</span>
        </div>
      </div>

      <section class="recent-section">
        <h2>Đơn hàng gần đây</h2>
        <div id="recent-orders" class="recent-list">
          <!-- Recent orders render ở đây -->
        </div>
      </section>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
